name: Migrate Database

on:
  push:
    branches:
      - staging
      - main

jobs:
  migrate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Migrate staging
        if: github.ref == 'refs/heads/staging'
        run: supabase db push --linked
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD_STAGING }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_STAGING_REF }}

      - name: Migrate production
        if: github.ref == 'refs/heads/main'
        run: supabase db push --linked
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD_PROD }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROD_REF }}
