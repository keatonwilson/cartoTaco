name: CI

# Validates every pull request (and pushes to the deploy branches) by running
# the same checks available locally: svelte-check, unit tests, and a production
# build. Complements Vercel's preview build, which only compiles the bundle and
# does not run type-checks or the test suite.

on:
  pull_request:
  push:
    branches: [main, staging]

permissions:
  contents: read

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Type-check, test, build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check (svelte-check)
        run: pnpm check

      - name: Unit tests (vitest)
        run: pnpm test

      - name: Production build
        run: pnpm build
