name: Seed Staging from Prod

on:
  workflow_dispatch:

jobs:
  seed:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install PostgreSQL 17 client
        run: |
          sudo apt-get install -y postgresql-common
          sudo /usr/share/postgresql-common/pgdg/apt.postgresql.org.sh -y
          sudo apt-get install -y postgresql-client-17

      - name: Dump prod schema and data
        run: pg_dump --no-owner --no-acl -d "$PROD_DB_URL" -f dump.sql
        env:
          PROD_DB_URL: ${{ secrets.SUPABASE_DB_URL_PROD }}

      - name: Restore into staging
        run: psql -d "$STAGING_DB_URL" -f dump.sql
        env:
          STAGING_DB_URL: ${{ secrets.SUPABASE_DB_URL_STAGING }}
